name: Ubuntu Server Direct Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build & Deploy on Ubuntu Runner
    #labels of the runner
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Create .env file
        run: |
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" > .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          echo "AGENT_API_KEY=${{ secrets.AGENT_API_KEY }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "QUOTE_API_USERNAME=${{ secrets.QUOTE_API_USERNAME }}" >> .env
          echo "QUOTE_API_PASSWORD=${{ secrets.QUOTE_API_PASSWORD }}" >> .env
          echo "GET_PRICE_API=${{ secrets.GET_PRICE_API }}" >> .env
          echo "QUOTE_API_URL=${{ secrets.QUOTE_API_URL }}" >> .env
          echo "APP_PORT=${{ secrets.APP_PORT }}" >> .env

      - name: Build and Restart Containers
        run: |
          # Create logs directory if it doesn't exist
          mkdir -p logs
          # Build and run containers
          docker compose -f docker-compose.prod.yaml up -d --build --remove-orphans

      - name: System Cleanup
        run: |
          # Cleanup dangling images to save space
          docker image prune -f
