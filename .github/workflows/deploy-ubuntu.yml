name: Ubuntu Server Direct Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build & Version Image
    runs-on: self-hosted
    outputs:
      image_tag: v${{ github.run_number }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Upgraded to fix Node.js warning

      - name: Build Local Image
        run: |
          # Build with both 'latest' and specific version tag
          docker build -t farikhan/quote_project:latest -t farikhan/quote_project:v${{ github.run_number }} .

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" > .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          echo "AGENT_API_KEY=${{ secrets.AGENT_API_KEY }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "QUOTE_API_USERNAME=${{ secrets.QUOTE_API_USERNAME }}" >> .env
          echo "QUOTE_API_PASSWORD=${{ secrets.QUOTE_API_PASSWORD }}" >> .env
          echo "GET_PRICE_API=${{ secrets.GET_PRICE_API }}" >> .env
          echo "QUOTE_API_URL=${{ secrets.QUOTE_API_URL }}" >> .env
          echo "APP_PORT=${{ secrets.APP_PORT }}" >> .env

      - name: Detect Docker Compose Version
        run: |
          if docker compose version > /dev/null 2>&1; then
            echo "DOCKER_CMD=docker compose" >> $GITHUB_ENV
          elif docker-compose version > /dev/null 2>&1; then
            echo "DOCKER_CMD=docker-compose" >> $GITHUB_ENV
          else
            echo "Error: Neither 'docker compose' nor 'docker-compose' found on the runner."
            exit 1
          fi

      - name: Build and Restart Containers
        env:
          IMAGE_TAG: v${{ github.run_number }}
        run: |
          # Create permanent folders on the server
          mkdir -p /home/metroadmin/quote_data/logs
          mkdir -p /home/metroadmin/quote_data/pg-data
          # Use the specific versioned image tag (e.g. v45)
          $DOCKER_CMD -f docker-compose.prod.yaml up -d --remove-orphans

      - name: System Cleanup
        run: |
          # Cleanup dangling images to save space
          docker image prune -f
