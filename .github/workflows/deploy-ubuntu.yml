name: Ubuntu Server Direct Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build & Deploy on Ubuntu Runner
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Create .env file
        run: |
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" > .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          echo "AGENT_API_KEY=${{ secrets.AGENT_API_KEY }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "QUOTE_API_USERNAME=${{ secrets.QUOTE_API_USERNAME }}" >> .env
          echo "QUOTE_API_PASSWORD=${{ secrets.QUOTE_API_PASSWORD }}" >> .env
          echo "GET_PRICE_API=${{ secrets.GET_PRICE_API }}" >> .env
          echo "QUOTE_API_URL=${{ secrets.QUOTE_API_URL }}" >> .env
          echo "APP_PORT=${{ secrets.APP_PORT }}" >> .env

      - name: Detect Docker Compose Version
        run: |
          if docker compose version > /dev/null 2>&1; then
            echo "DOCKER_CMD=docker compose" >> $GITHUB_ENV
            echo "Detected Docker Compose V2"
          elif docker-compose version > /dev/null 2>&1; then
            echo "DOCKER_CMD=docker-compose" >> $GITHUB_ENV
            echo "Detected Docker Compose V1"
          else
            echo "Error: Neither 'docker compose' nor 'docker-compose' found on the runner."
            exit 1
          fi

      - name: Build and Restart Containers
        run: |
          # Ensure logs directory exists
          mkdir -p logs
          # Use the detected command to manage containers
          $DOCKER_CMD -f docker-compose.prod.yaml up -d --build --remove-orphans

      - name: System Cleanup
        run: |
          # Cleanup dangling images to save space
          docker image prune -f
