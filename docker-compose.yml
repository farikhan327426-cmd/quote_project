version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Farhan2020}
      POSTGRES_DB: ${POSTGRES_DB:-agentic_ai_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  agent:
    build:
      context: .
    image: mspl_quote_practice:local
    env_file:
      - .env
    environment:
      POSTGRES_URL: postgresql://postgres:Farhan2020@postgres:5432/agentic_ai_db
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  pgdata: